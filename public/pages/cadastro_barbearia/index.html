<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarberTrack</title>
    <script src="/pages/cadastro_barbearia/scripts.js" defer></script>
  </head>
  <body>
    <div class="cadastro-box">
      <h1>Cadastro de Barbearia</h1>
      <form action="/barbearia/cadastro" method="POST">
        <label>Nome Fantasia</label>
        <input
          type="text"
          name="nome_fantasia"
          placeholder="Nome da barbearia"
          required
        />

        <label>Razão Social</label>
        <input
          type="text"
          name="razao_social"
          placeholder="Razão Social"
          required
        />

        <label>CNPJ</label>
        <input type="text" name="cnpj" placeholder="CNPJ" required />

        <label>Email</label>
        <input type="email" name="email" placeholder="Email" required />

        <label>Telefone</label>
        <input type="text" name="telefone" placeholder="Telefone" required />

        <label>Senha</label>
        <input type="password" name="senha" placeholder="Senha" required />

        <label>Confirmar Senha</label>
        <input
          type="password"
          id="confirmarSenha"
          placeholder="Confirme a senha"
          required
        />

        <button type="submit">Cadastrar</button>
      </form>

      <br />
      <a href="/barbearia/login">Já tenho uma conta</a>
    </div>
    <script src="/pages/cadastro_barbearia/script.js"></script>
    <!--  Validação da senha no front (senhas iguais, para nao add senhas difrentes no confirmar senha) -->
    <script>
      const form = document.querySelector("form");
      const senha = document.querySelector('input[name="senha"]');
      const confirmar = document.getElementById("confirmarSenha");

      form.addEventListener("submit", function (e) {
        if (senha.value !== confirmar.value) {
          e.preventDefault();
          alert("As senhas não coincidem!");
        }
      });
    </script>
  </body>
</html>
