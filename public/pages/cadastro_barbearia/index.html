<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarberTrack — Cadastro de Barbearia</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/styles/global.css" rel="stylesheet" />
    <script src="/pages/cadastro_barbearia/scripts.js" defer></script>
  </head>
  <body>
    <div class="bt-card wide">
      <a href="/" class="bt-logo">
        <div class="bt-logo-icon">✂</div>
        <span class="bt-logo-text">BarberTrack</span>
      </a>

      <h1 class="bt-title">Cadastro de Barbearia</h1>
      <p class="bt-subtitle">Registre seu estabelecimento na plataforma</p>

      <form action="/barbearia/cadastro" method="POST">
        <div class="bt-row mb-3">
          <div>
            <label class="bt-label">Nome Fantasia</label>
            <input
              class="bt-input"
              type="text"
              name="nome_fantasia"
              placeholder="Ex: Barbearia do João"
              required
            />
          </div>
          <div>
            <label class="bt-label">Razão Social</label>
            <input
              class="bt-input"
              type="text"
              name="razao_social"
              placeholder="João Silva LTDA"
              required
            />
          </div>
        </div>

        <div class="mb-3">
          <label class="bt-label">CNPJ</label>
          <input
            class="bt-input"
            type="text"
            name="cnpj"
            placeholder="00.000.000/0000-00"
            maxlength="14"
            inputmode="numeric"
            required
          />
        </div>

        <div class="mb-3">
          <label class="bt-label">Email</label>
          <input
            class="bt-input"
            type="email"
            name="email"
            placeholder="contato@barbearia.com"
            required
          />
        </div>

        <div class="mb-3">
          <label class="bt-label">Telefone</label>
          <input
            class="bt-input"
            type="text"
            name="telefone"
            placeholder="(44) 99999-9999"
            maxlength="11"
            inputmode="numeric"
            required
          />
        </div>

        <hr class="bt-divider" />

        <div class="mb-3">
          <label class="bt-label">Senha</label>
          <input
            class="bt-input"
            type="password"
            name="senha"
            placeholder="Mínimo 8 caracteres"
            required
          />
        </div>

        <div class="mb-3">
          <label class="bt-label">Confirmar Senha</label>
          <input
            class="bt-input"
            type="password"
            id="confirmarSenha"
            placeholder="Repita a senha"
            required
          />
        </div>

        <button type="submit" class="bt-btn">Cadastrar Barbearia</button>
      </form>

      <a href="/" class="bt-footer-link"
        >Já tenho uma conta — <span>Entrar</span></a
      >
    </div>
  </body>
</html>
