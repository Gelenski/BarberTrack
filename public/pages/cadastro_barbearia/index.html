<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarberTrack - Cadastro de Barbearia</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/styles/global.css" rel="stylesheet" />
    <script src="/scripts/form-feedback.js" defer></script>
    <script src="/pages/cadastro_barbearia/scripts.js" defer></script>
  </head>
  <body>
    <div class="bt-card wide">
      <a href="/" class="bt-logo" aria-label="Voltar para o login">
        <div class="bt-logo-icon">✂</div>
        <span class="bt-logo-text">BarberTrack</span>
      </a>

      <h1 class="bt-title">Cadastro de Barbearia</h1>
      <p class="bt-subtitle">Registre seu estabelecimento na plataforma</p>

      <form action="/barbearia/cadastro" method="post" id="barbearia-form">
        <div class="bt-row mb-3">
          <div data-field>
            <label class="bt-label" for="nome_fantasia">Nome fantasia</label>
            <input
              class="bt-input"
              type="text"
              id="nome_fantasia"
              name="nome_fantasia"
              placeholder="Ex: Barbearia do João"
              autocomplete="organization"
              required
            />
          </div>
          <div data-field>
            <label class="bt-label" for="razao_social">Razão social</label>
            <input
              class="bt-input"
              type="text"
              id="razao_social"
              name="razao_social"
              placeholder="João Silva LTDA"
              autocomplete="organization"
              required
            />
          </div>
        </div>

        <div class="mb-3" data-field>
          <label class="bt-label" for="cnpj">CNPJ</label>
          <input
            class="bt-input"
            type="text"
            id="cnpj"
            name="cnpj"
            placeholder="00.000.000/0000-00"
            maxlength="18"
            inputmode="numeric"
            required
          />
        </div>

        <div class="mb-3" data-field>
          <label class="bt-label" for="email">Email</label>
          <input
            class="bt-input"
            type="email"
            id="email"
            name="email"
            placeholder="contato@barbearia.com"
            autocomplete="email"
          />
        </div>

        <div class="mb-3" data-field>
          <label class="bt-label" for="telefone">Telefone</label>
          <input
            class="bt-input"
            type="text"
            id="telefone"
            name="telefone"
            placeholder="(44) 99999-9999"
            maxlength="15"
            inputmode="numeric"
            autocomplete="tel"
          />
        </div>

        <hr class="bt-divider" />

        <div class="mb-3" data-field>
          <label class="bt-label" for="senha">Senha</label>
          <input
            class="bt-input"
            type="password"
            id="senha"
            name="senha"
            placeholder="Senha1!"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="mb-3" data-field>
          <label class="bt-label" for="confirmarSenha">Confirmar senha</label>
          <input
            class="bt-input"
            type="password"
            id="confirmarSenha"
            name="confirmarSenha"
            placeholder="Repita a senha"
            autocomplete="new-password"
            required
          />
        </div>

        <button type="submit" class="bt-btn">Cadastrar Barbearia</button>
      </form>

      <a href="/" class="bt-footer-link"
        >Já tenho uma conta - <span>Entrar</span></a
      >
    </div>
  </body>
</html>
