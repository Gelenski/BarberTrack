<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarberTrack - Nova Senha</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/styles/global.css" rel="stylesheet" />
    <script src="/scripts/form-feedback.js" defer></script>
    <script src="/pages/reset_senha/nova_senha/script.js" defer></script>
  </head>
  <body>
    <div class="bt-card">
      <a href="/" class="bt-logo" aria-label="Voltar para o login">
        <div class="bt-logo-icon">✂</div>
        <span class="bt-logo-text">BarberTrack</span>
      </a>

      <h1 class="bt-title">Nova Senha</h1>
      <p class="bt-subtitle">Digite e confirme sua nova senha</p>

      <form id="nova-senha-form">
        <div class="mb-3" data-field>
          <label class="bt-label" for="senha">Nova senha</label>
          <input
            class="bt-input"
            type="password"
            id="senha"
            name="senha"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
            required
          />
          <small class="bt-input-help">Use pelo menos 8 caracteres.</small>
        </div>

        <div class="mb-3" data-field>
          <label class="bt-label" for="confirmarsenha"
            >Confirmar nova senha</label
          >
          <input
            class="bt-input"
            type="password"
            id="confirmarsenha"
            name="confirmarsenha"
            placeholder="Repita a nova senha"
            autocomplete="new-password"
            required
          />
        </div>

        <button type="submit" class="bt-btn">Redefinir senha</button>
      </form>

      <a href="/auth/login" class="bt-footer-link"
        >Lembrei minha senha - <span>Entrar</span></a
      >
    </div>
  </body>
</html>
