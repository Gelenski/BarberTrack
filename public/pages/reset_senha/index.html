<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarberTrack - Recuperar Senha</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/styles/global.css" rel="stylesheet" />
    <script src="/scripts/form-feedback.js" defer></script>
    <script src="/pages/reset_senha/script.js" defer></script>
  </head>
  <body>
    <div class="bt-card">
      <a href="/" class="bt-logo" aria-label="Voltar para o login">
        <div class="bt-logo-icon">✂</div>
        <span class="bt-logo-text">BarberTrack</span>
      </a>

      <h1 class="bt-title">Recuperar Senha</h1>
      <p class="bt-subtitle">
        Informe seu e-mail para receber o link de redefinição
      </p>

      <form id="reset-form">
        <div class="mb-3" data-field>
          <label for="tipo-perfil" class="bt-label">Entrar como</label>
          <select
            class="bt-select"
            name="tipo-perfil"
            id="tipo-perfil"
            required
          >
            <option value="" selected>Selecione seu perfil</option>
            <option value="cliente">Cliente</option>
            <option value="barbearia">Barbearia</option>
          </select>
        </div>

        <div class="mb-3" data-field>
          <label class="bt-label" for="email">E-mail</label>
          <input
            class="bt-input"
            type="email"
            id="email"
            name="email"
            placeholder="joao@email.com"
            autocomplete="email"
            required
          />
        </div>

        <button type="submit" class="bt-btn">Enviar link</button>
      </form>

      <a href="/auth/login" class="bt-footer-link"
        >Lembrei minha senha - <span>Entrar</span></a
      >
    </div>
  </body>
</html>
