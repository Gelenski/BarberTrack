<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarberTrack</title>
    <script src="/pages/login/scripts.js" defer></script>
  </head>
  <body>
    <div class="login-box">
      <h1>Login</h1>
      <form action="" method="post" id="form">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Insira o seu email"
          required
        />

        <label for="senha">Senha</label>
        <input
          type="password"
          id="senha"
          name="senha"
          placeholder="Insira a sua senha"
          required
        />
        <button id="btn-entrar" type="submit">Entrar</button>
        <a href="/cliente/cadastro">Cadastrar como Cliente</a>
        <a href="/barbearia/cadastro">Cadastrar como Barbearia</a>
      </form>
    </div>
  </body>
</html>
