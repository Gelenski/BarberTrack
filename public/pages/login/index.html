<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarberTrack</title>
    <script src="index.js" defer></script>
  </head>
  <body>
    <select id="escolha">
      <option value="1">Certo</option>
      <option value="2">Errado</option>
    </select>

    <span id="teste"></span>
    <button id="uqarenta">EnvioTESTE</button>
    <div class="login-box">
      <h1>Login</h1>
      <form action="" method="post">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="Insira o seu email"
          required
        />

        <label for="senha">Senha</label>
        <input
          type="password"
          id="senha"
          placeholder="Insira a sua senha"
          required
        />
        <button id="btn-entrar" type="submit">Entrar</button>
        <a href="/cliente/cadastro">Cadastrar como Cliente</a>
        <a href="/barbearia/cadastro">Cadastrar como Barbearia</a>
      </form>
    </div>
    <script>
      let opcao = document.getElementById("escolha").value;
      let botao = document.getElementById("uqarenta");
      let caixa = document.getElementById("teste");

      botao.addEventListener("click", () => {
        caixa.innerHTML = "TESTE";
      });
    </script>
  </body>
</html>
