<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarberTrack - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/styles/global.css" rel="stylesheet" />
    <script src="/scripts/form-feedback.js" defer></script>
    <script src="/pages/login/script.js" defer></script>
  </head>
  <body>
    <div class="bt-card">
      <a href="/" class="bt-logo" aria-label="Voltar para o login">
        <div class="bt-logo-icon">✂</div>
        <span class="bt-logo-text">BarberTrack</span>
      </a>

      <h1 class="bt-title">Entrar</h1>
      <p class="bt-subtitle">Acesse sua conta para continuar</p>

      <form method="post" id="form">
        <div class="mb-3" data-field>
          <label class="bt-label" for="email">Email</label>
          <input
            class="bt-input"
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="mb-3" data-field>
          <label class="bt-label" for="senha">Senha</label>
          <input
            class="bt-input"
            type="password"
            id="senha"
            name="senha"
            placeholder="Sua senha"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="mb-3" data-field>
          <label for="tipo-perfil" class="bt-label">Entrar como</label>
          <select
            class="bt-select"
            name="tipo-perfil"
            id="tipo-perfil"
            required
          >
            <option value="" selected>Selecione seu perfil</option>
            <option value="cliente">Cliente</option>
            <option value="barbearia">Barbearia</option>
          </select>
        </div>

        <button type="submit" id="btn-entrar" class="bt-btn">Entrar</button>
      </form>

      <a href="/cliente/cadastro" class="bt-footer-link"
        >Não tem conta? <span>Cadastrar como cliente</span></a
      >
      <a href="/barbearia/cadastro" class="bt-footer-link mt-1"
        >É uma barbearia? <span>Cadastrar estabelecimento</span></a
      >

      <a href="/auth/reset-senha" class="bt-footer-link mt-1"
        >Esqueceu sua senha? <span>Resetar senha</span></a
      >
    </div>
  </body>
</html>
