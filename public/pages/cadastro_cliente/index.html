<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarberTrack</title>
  </head>
  <body>
    <div class="cadastro-box">
      <h1>Cadastro de Cliente</h1>
      <form action="/cliente/cadastro" method="post">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Insira o seu nome" required />

        <label for="sobrenome">Sobrenome</label>
        <input type="text" id="sobrenome" name="sobrenome" placeholder="Insira o seu sobrenome" required />

        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Insira o seu email"
          required
        />

        <label for="telefone">Telefone</label>
        <input
          type="text"
          id="telefone"
          name="telefone"
          placeholder="Insira o seu telefone"
          required
        />

        <label for="senha">Senha</label>
        <input
          type="password"
          id="senha"
          name="senha"
          placeholder="Insira a sua senha"
          required
        />

        <label for="confirmar-senha">Confirmar Senha</label>
        <input
          type="password"
          id="confirmar-senha"
          name="confirmar-senha"
          placeholder="Confirme a sua senha"
          required
        />

        <button id="btn-cadastrar">Cadastrar</button>
        <a href="/login">Já tenho uma conta</a>
      </form>
    </div>
    <script src="/pages/cadastro_cliente/script.js"></script>
  </body>
</html>
