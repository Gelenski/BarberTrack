<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberTrack</title>
</head>
<body>
    <div class="cadastro-box">
        <h1>Cadastro de Cliente</h1>
        <form action="" method="post">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Insira o seu nome" required>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Insira o seu email" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Insira a sua senha" required>

            <label for="confirmar-senha">Confirmar Senha</label>
            <input type="password" id="confirmar-senha" placeholder="Confirme a sua senha" required>

            <button id="btn-cadastrar">Cadastrar</button>
            <a href="/login">Já tenho uma conta</a>
        </form>
    </div>
</body>
</html>
