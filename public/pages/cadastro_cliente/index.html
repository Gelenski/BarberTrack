<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarberTrack - Cadastro de Cliente</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/styles/global.css" rel="stylesheet" />
    <script src="/scripts/form-feedback.js" defer></script>
    <script src="/pages/cadastro_cliente/script.js" defer></script>

    <style>
      .barbearias-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1rem;
      }

      .barbearia-card {
        position: relative;
      }

      .barbearia-card input {
        display: none;
      }

      .barbearia-label {
        display: flex;
        align-items: center;
        justify-content: center;

        padding: 1rem;

        border: 2px solid #dcdcdc;
        border-radius: 12px;

        background: white;

        cursor: pointer;

        transition: all 0.2s ease;

        font-weight: 500;
      }

      .barbearia-label:hover {
        border-color: #111827;
        transform: translateY(-2px);
      }

      .barbearia-card input:checked + .barbearia-label {
        background: #111827;
        color: white;
        border-color: #111827;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      }
    </style>
  </head>
  <body>
    <div class="bt-card">
      <a href="/" class="bt-logo" aria-label="Voltar para o login">
        <div class="bt-logo-icon">✂</div>
        <span class="bt-logo-text">BarberTrack</span>
      </a>

      <h1 class="bt-title">Cadastro</h1>
      <p class="bt-subtitle">Crie sua conta para agendar serviços</p>

      <form action="/cliente/cadastro" method="post" id="cliente-form">
        <div class="bt-row mb-3">
          <div data-field>
            <label class="bt-label" for="nome">Nome</label>
            <input
              class="bt-input"
              type="text"
              id="nome"
              name="nome"
              placeholder="João"
              autocomplete="given-name"
              required
            />
          </div>
          <div data-field>
            <label class="bt-label" for="sobrenome">Sobrenome</label>
            <input
              class="bt-input"
              type="text"
              id="sobrenome"
              name="sobrenome"
              placeholder="Silva"
              autocomplete="family-name"
              required
            />
          </div>
        </div>

        <div class="mb-3" data-field>
          <label class="bt-label" for="email">Email</label>
          <input
            class="bt-input"
            type="email"
            id="email"
            name="email"
            placeholder="joao@email.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="mb-3" data-field>
          <label class="bt-label" for="telefone">Telefone</label>
          <input
            class="bt-input"
            type="text"
            id="telefone"
            name="telefone"
            placeholder="(44) 99999-9999"
            maxlength="15"
            inputmode="numeric"
            autocomplete="tel"
            required
          />
        </div>

        <hr class="bt-divider" />

        <div class="mb-3" data-field>
          <label class="bt-label" for="senha">Senha</label>
          <input
            class="bt-input"
            type="password"
            id="senha"
            name="senha"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
            required
          />
          <small class="bt-input-help">Use pelo menos 8 caracteres.</small>
        </div>

        <div class="mb-3" data-field>
          <label class="bt-label" for="confirmarsenha">Confirmar senha</label>
          <input
            class="bt-input"
            type="password"
            id="confirmarsenha"
            name="confirmarsenha"
            placeholder="Repita a senha"
            autocomplete="new-password"
            required
          />
        </div>

        <hr class="bt-divider" />

        <div class="mb-3">
          <label class="bt-label">Barbearia(s)</label>

          <p class="bt-subtitle" style="margin-bottom: 0.75rem">
            Selecione as barbearias que você frequenta.
          </p>

          <!-- INPUT DE BUSCA -->
          <input
            type="text"
            id="filtro-barbearias"
            class="form-control mb-3"
            placeholder="Buscar barbearia..."
          />

          <!-- LISTA -->
          <div id="lista-barbearias"></div>
        </div>

        <button type="submit" class="bt-btn">Cadastrar</button>
      </form>

      <a href="/" class="bt-footer-link"
        >Já tenho uma conta - <span>Entrar</span></a
      >
    </div>
  </body>
</html>
