<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarberTrack - Dashboard do Barbeiro</title>
    <link rel="stylesheet" href="/styles/globalDashboard.css" />
    <script src="/scripts/dashboard_barbeiro.js" defer></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- TOPBAR -->
    <header class="topbar">
      <a href="/barbeiro/dashboard" class="bt-logo">
        <div class="bt-logo-icon">✂</div>
        <span class="bt-logo-text">BarberTrack</span>
      </a>
      <div class="topbar-right">
        <button class="hamburger" id="btn-hamburger" aria-label="Abrir menu">
          <span></span><span></span><span></span>
        </button>
        <span class="greeting">Olá, <strong id="nome-barbeiro">...</strong></span>
        <div class="avatar" id="avatar-inicial"></div>
      </div>
    </header>

    <!-- LAYOUT -->
    <div class="layout">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-section">
          <span class="sidebar-label">Principal</span>
          <a class="nav-item active" href="/barbeiro/dashboard">
            <span class="icon">◈</span> Dashboard
          </a>
          <a class="nav-item" href="/barbeiro/agenda">
            <span class="icon">📅</span> Minha Agenda
          </a>
        </div>

        <hr class="sidebar-divider" />

        <div class="sidebar-section">
          <span class="sidebar-label">Sistema</span>
          <button class="nav-item" id="btn-logout">
            <span class="icon">↩</span> Sair
          </button>
        </div>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <!-- PAGE HEADER -->
        <div class="page-header">
          <div>
            <h1>Dashboard</h1>
            <span class="date-label" id="data-atual"></span>
          </div>
          <a href="/barbeiro/agenda" class="btn-primary">Ver agenda completa</a>
        </div>

        <!-- MÉTRICAS -->
        <div class="metrics-grid">
          <div class="metric-card">
            <div class="metric-label"><span class="dot"></span>Atendimentos Hoje</div>
            <div class="metric-value" id="m-total">--</div>
            <div class="metric-change neutral" id="m-total-info">Carregando...</div>
          </div>
          <div class="metric-card">
            <div class="metric-label"><span class="dot"></span>Confirmados</div>
            <div class="metric-value" id="m-confirmados">--</div>
            <div class="metric-change neutral">agendados para hoje</div>
          </div>
          <div class="metric-card">
            <div class="metric-label"><span class="dot"></span>Receita do Dia</div>
            <div class="metric-value gold" id="m-receita">--</div>
            <div class="metric-change neutral">excluindo cancelados</div>
          </div>
          <div class="metric-card">
            <div class="metric-label"><span class="dot"></span>Próximo Cliente</div>
            <div class="metric-value" id="m-proximo">--</div>
            <div class="metric-change neutral" id="m-proximo-info">–</div>
          </div>
        </div>

        <!-- AGENDA DO DIA -->
        <div class="card" style="margin-top: 1.25rem;">
          <div class="card-header">
            <span class="card-title">Agenda de Hoje</span>
            <a class="card-action" href="/barbeiro/agenda">Ver completa →</a>
          </div>
          <div class="agenda-list" id="agenda-list">
            <div class="barber-skeleton" style="height:56px;border-radius:8px;"></div>
            <div class="barber-skeleton" style="height:56px;border-radius:8px;margin-top:.5rem;"></div>
            <div class="barber-skeleton" style="height:56px;border-radius:8px;margin-top:.5rem;"></div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
