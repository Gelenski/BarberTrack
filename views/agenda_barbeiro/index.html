<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarberTrack - Agenda do Barbeiro</title>
    <link rel="stylesheet" href="/styles/globalDashboard.css" />
    <link rel="stylesheet" href="/styles/agenda_barbeiro.css" />
    <script src="/scripts/agenda_barbeiro.js" defer></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <header class="topbar">
      <a href="/barbeiro/dashboard" class="bt-logo">
        <div class="bt-logo-icon">✂</div>
        <span class="bt-logo-text">BarberTrack</span>
      </a>
      <div class="topbar-right">
        <button class="hamburger" id="btn-hamburger" aria-label="Abrir menu">
          <span></span><span></span><span></span>
        </button>
        <span class="greeting"
          >Olá, <strong id="nome-barbeiro">...</strong></span
        >
        <div class="avatar" id="avatar-inicial"></div>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-section">
          <span class="sidebar-label">Principal</span>
          <a class="nav-item" href="/barbeiro/dashboard">
            <span class="icon">◈</span> Dashboard
          </a>
          <a class="nav-item active" href="/barbeiro/agenda">
            <span class="icon">📅</span> Minha Agenda
          </a>
        </div>
        <hr class="sidebar-divider" />
        <div class="sidebar-section">
          <span class="sidebar-label">Sistema</span>
          <button class="nav-item" id="btn-logout">
            <span class="icon">↩</span> Sair
          </button>
        </div>
      </aside>

      <main class="main">
        <!-- HEADER -->
        <div class="page-header">
          <div>
            <h1>Minha Agenda</h1>
            <span class="date-label" id="periodo-label"></span>
          </div>
          <a href="/barbeiro/dashboard" class="btn-primary">← Voltar</a>
        </div>

        <!-- CONTROLES -->
        <div class="agenda-controles">
          <div class="agenda-nav">
            <button class="nav-btn" id="btn-anterior">‹</button>
            <button class="nav-btn hoje-btn" id="btn-hoje">Hoje</button>
            <button class="nav-btn" id="btn-proximo">›</button>
          </div>
          <div class="view-toggle">
            <button class="view-btn active" data-view="semana">Semana</button>
            <button class="view-btn" data-view="dia">Dia</button>
            <button class="view-btn" data-view="mes">Mês</button>
          </div>
        </div>

        <!-- VISUALIZAÇÃO SEMANA / DIA -->
        <div id="view-semana" class="view-content">
          <div id="semana-container"></div>
        </div>

        <!-- VISUALIZAÇÃO MÊS -->
        <div id="view-mes" class="view-content" style="display: none">
          <div class="calendario-grid" id="calendario-header">
            <div class="cal-header">Dom</div>
            <div class="cal-header">Seg</div>
            <div class="cal-header">Ter</div>
            <div class="cal-header">Qua</div>
            <div class="cal-header">Qui</div>
            <div class="cal-header">Sex</div>
            <div class="cal-header">Sáb</div>
          </div>
          <div class="calendario-grid" id="calendario-body"></div>
        </div>

        <!-- MODAL DE DIA (mês) -->
        <div id="modal-dia" class="modal-overlay" style="display: none">
          <div class="modal-box">
            <div class="modal-header">
              <span class="modal-titulo" id="modal-titulo"></span>
              <button class="modal-fechar" id="btn-fechar-modal">✕</button>
            </div>
            <div class="agenda-list" id="modal-lista"></div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
