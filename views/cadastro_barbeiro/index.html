<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarberTrack - Cadastro de Barbeiro</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/styles/global.css" rel="stylesheet" />
    <script src="/scripts/form-feedback.js" defer></script>
    <script src="/scripts/cadastro_barbeiro.js" defer></script>
  </head>
  <body>
    <div class="bt-card">
      <a
        href="/barbearia/dashboard"
        class="bt-logo"
        aria-label="Voltar para o dashboard da barbearia"
      >
        <div class="bt-logo-icon">&#9986;</div>
        <span class="bt-logo-text">BarberTrack</span>
      </a>

      <h1 class="bt-title">Cadastro de Barbeiro</h1>
      <p class="bt-subtitle">
        Cadastre um profissional e vincule-o automaticamente a sua barbearia.
      </p>

      <form action="/barbeiro/cadastro" method="post" id="barbeiro-form">
        <div class="bt-row mb-3">
          <div data-field>
            <label class="bt-label" for="nome">Nome</label>
            <input
              class="bt-input"
              type="text"
              id="nome"
              name="nome"
              placeholder="Joao"
              autocomplete="given-name"
              required
            />
          </div>
          <div data-field>
            <label class="bt-label" for="sobrenome">Sobrenome</label>
            <input
              class="bt-input"
              type="text"
              id="sobrenome"
              name="sobrenome"
              placeholder="Silva"
              autocomplete="family-name"
              required
            />
          </div>
        </div>

        <div class="mb-3" data-field>
          <label class="bt-label" for="email">Email</label>
          <input
            class="bt-input"
            type="email"
            id="email"
            name="email"
            placeholder="joao@email.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="mb-3" data-field>
          <label class="bt-label" for="telefone">Telefone</label>
          <input
            class="bt-input"
            type="text"
            id="telefone"
            name="telefone"
            placeholder="(44) 99999-9999"
            maxlength="15"
            inputmode="numeric"
            autocomplete="tel"
            required
          />
        </div>

        <div class="mb-3" data-field>
          <label class="bt-label" for="cpf">CPF</label>
          <input
            class="bt-input"
            type="text"
            id="cpf"
            name="cpf"
            placeholder="000.000.000-00"
            maxlength="14"
            inputmode="numeric"
            autocomplete="off"
            required
          />
        </div>

        <div class="mb-3" data-field>
          <label class="bt-label" for="senha">Senha</label>
          <input
            class="bt-input"
            type="password"
            id="senha"
            name="senha"
            placeholder="Ex: Senha1!"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="mb-3" data-field>
          <label class="bt-label" for="confirmarSenha">Confirmar Senha</label>
          <input
            class="bt-input"
            type="password"
            id="confirmarSenha"
            name="confirmarSenha"
            placeholder="Digite a senha novamente"
            autocomplete="new-password"
            required
          />
        </div>

        <hr class="bt-divider" />

        <button type="submit" class="bt-btn">Cadastrar Barbeiro</button>
      </form>

      <a href="/barbearia/dashboard" class="bt-footer-link"
        >Voltar para o <span>dashboard da barbearia</span></a
      >
    </div>
  </body>
</html>
