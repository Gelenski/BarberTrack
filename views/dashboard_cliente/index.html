<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarberTrack - Dashboard do Cliente</title>
    <link href="/styles/global.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="bt-card wide">
      <a href="/" class="bt-logo">
        <div class="bt-logo-icon">✂</div>
        <span class="bt-logo-text">BarberTrack</span>
      </a>

      <h1 class="bt-title">Olá, Cliente!</h1>
      <p class="bt-subtitle">Bem-vindo ao seu painel.</p>

      <hr class="bt-divider" />

      <!-- BARBEARIA ATIVA -->
      <h2 class="bt-title" style="font-size: 1.25rem; margin-bottom: 0.25rem;">
        Barbearia Atual
      </h2>
      <p class="bt-subtitle">Selecione qual barbearia deseja visualizar.</p>
      <select class="bt-select" id="select-barbearia-ativa" style="margin-bottom: 1rem;">
        <option value="">Carregando...</option>
      </select>

      <!-- HORÁRIOS -->
      <h2 class="bt-title" style="font-size: 1.1rem; margin-bottom: 0.25rem;">
        Horários de Funcionamento
      </h2>
      <div id="horarios-status" class="bt-form-status is-info">
        Carregando horários...
      </div>
      <div id="horarios-container"></div>

      <hr class="bt-divider" />

      <!-- MINHAS BARBEARIAS -->
      <h2 class="bt-title" style="font-size: 1.25rem; margin-bottom: 0.25rem;">
        Minhas Barbearias
      </h2>
      <p class="bt-subtitle">Barbearias que você frequenta.</p>
      <div id="minhas-barbearias"></div>

      <hr class="bt-divider" />

      <!-- ADICIONAR BARBEARIA -->
      <h2 class="bt-title" style="font-size: 1.25rem; margin-bottom: 0.25rem;">
        Adicionar Barbearia
      </h2>
      <p class="bt-subtitle">Vincule-se a uma nova barbearia.</p>
      <div style="display: flex; gap: 0.5rem; align-items: center;">
        <select class="bt-select" id="select-nova-barbearia">
          <option value="">Selecione uma barbearia</option>
        </select>
        <button class="bt-btn" id="btn-adicionar-barbearia" style="margin-top: 0; width: auto; padding: 0.65rem 1rem;">
          Adicionar
        </button>
      </div>
      <div id="aviso-barbearia" style="margin-top: 0.5rem;"></div>

      <hr class="bt-divider" />

      <button class="bt-btn" id="btn-logout">Sair</button>
    </div>

    <script src="/scripts/dashboard_cliente.js"></script>
  </body>
</html>
